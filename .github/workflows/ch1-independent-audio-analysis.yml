name: Chapter 1 Independent Audio Analysis

on:
  push:
    branches:
      - audiobook-approved-manifest
    paths:
      - '.github/workflows/ch1-independent-audio-analysis.yml'
      - 'scratchpad/ch1-audio-review/*.mp3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audiobook-approved-manifest
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audio analysis tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          python -m pip install --quiet faster-whisper librosa soundfile scipy numpy

      - name: Analyze all three clips
        run: |
          cat > /tmp/analyze_ch1.py <<'PY'
          import json, math, os, re
          from pathlib import Path
          import numpy as np
          import librosa
          from scipy.spatial.distance import cdist
          from faster_whisper import WhisperModel

          ROOT = Path('scratchpad/ch1-audio-review')
          FILES = {
              'CURRENT': ROOT / 'CH1-CURRENT-comparison.mp3',
              'V2': ROOT / 'CH1-V2-comparison.mp3',
              'V1': ROOT / 'CH1-V1-comparison.mp3',
          }
          expected = ('these traditions emphasized strict ceremonial protocols fasting prayer and guidance '
                      'by an elder or curandero to ensure safe passage through spiritual realms')

          model = WhisperModel('small.en', device='cpu', compute_type='int8')
          results = {}

          def norm(s):
              return re.sub(r'[^a-z0-9 ]+', ' ', s.lower()).replace('  ', ' ').strip()

          def lev(a, b):
              aa, bb = a.split(), b.split()
              d = list(range(len(bb)+1))
              for i, x in enumerate(aa, 1):
                  nd = [i]
                  for j, y in enumerate(bb, 1):
                      nd.append(min(nd[-1]+1, d[j]+1, d[j-1]+(x!=y)))
                  d = nd
              return d[-1], max(len(aa), len(bb), 1)

          for label, path in FILES.items():
              segments, info = model.transcribe(str(path), beam_size=5, word_timestamps=True,
                                                vad_filter=False, condition_on_previous_text=False)
              segs = list(segments)
              transcript = ' '.join(s.text.strip() for s in segs).strip()
              words = []
              for s in segs:
                  for w in (s.words or []):
                      words.append({'word': w.word.strip(), 'start': w.start, 'end': w.end,
                                    'probability': w.probability})

              y, sr = librosa.load(path, sr=16000, mono=True)
              rms = librosa.feature.rms(y=y, frame_length=2048, hop_length=256)[0]
              db = librosa.amplitude_to_db(np.maximum(rms, 1e-10), ref=1.0)
              centroid = librosa.feature.spectral_centroid(y=y, sr=sr, hop_length=256)[0]
              zcr = librosa.feature.zero_crossing_rate(y, hop_length=256)[0]
              f0 = librosa.yin(y, fmin=65, fmax=400, sr=sr, frame_length=2048, hop_length=256)
              voiced = f0[np.isfinite(f0) & (f0 > 65) & (f0 < 400)]
              mfcc = librosa.feature.mfcc(y=y, sr=sr, n_mfcc=20, hop_length=256)
              delta = librosa.feature.delta(mfcc)
              feat = np.vstack([mfcc, delta])

              dist, denom = lev(norm(transcript), expected)
              phrase_hits = [w for w in words if norm(w['word']) in ('to','ensure')]
              results[label] = {
                  'transcript': transcript,
                  'normalized_transcript': norm(transcript),
                  'words': words,
                  'duration': len(y)/sr,
                  'wer_like': dist/denom,
                  'rms_db_median': float(np.median(db)),
                  'rms_db_p95': float(np.percentile(db, 95)),
                  'spectral_centroid_median_hz': float(np.median(centroid)),
                  'zcr_median': float(np.median(zcr)),
                  'f0_median_hz': float(np.median(voiced)) if len(voiced) else None,
                  'f0_iqr_hz': float(np.percentile(voiced,75)-np.percentile(voiced,25)) if len(voiced) else None,
                  'phrase_hits': phrase_hits,
                  '_feat': feat,
              }

          # Dynamic-time-warped acoustic similarity to CURRENT using all clean material.
          # Exclude CURRENT 18.0-26.5 s, the known breakdown zone inside this 43.4 s clip.
          cur = results['CURRENT']['_feat']
          hop_sec = 256/16000
          mask = np.ones(cur.shape[1], dtype=bool)
          mask[int(18.0/hop_sec):int(26.5/hop_sec)] = False
          cur_clean = cur[:, mask]

          for label in ('V1','V2'):
              cand = results[label]['_feat']
              # MFCC cosine DTW, normalized path cost; lower is better.
              D, wp = librosa.sequence.dtw(X=cur_clean, Y=cand, metric='cosine')
              results[label]['dtw_clean_current_cost'] = float(D[-1,-1] / max(len(wp),1))

          # Local boundary similarity: compare first/last 9 seconds, which are known clean.
          for label in ('V1','V2'):
              costs=[]
              for a,b in ((0,9),(-9,None)):
                  A = results['CURRENT']['_feat'][:, a if a>=0 else int(a/hop_sec): int(b/hop_sec) if b else None]
                  B = results[label]['_feat'][:, a if a>=0 else int(a/hop_sec): int(b/hop_sec) if b else None]
                  D, wp = librosa.sequence.dtw(X=A, Y=B, metric='cosine')
                  costs.append(float(D[-1,-1]/max(len(wp),1)))
              results[label]['boundary_match_cost'] = float(np.mean(costs))

          for v in results.values():
              v.pop('_feat', None)

          # Deterministic recommendation: require clean phrase, then prioritize boundary match,
          # overall accepted-voice match, pitch and loudness proximity.
          cur = results['CURRENT']
          scores={}
          for label in ('V1','V2'):
              r=results[label]
              has_phrase = 'to ensure' in r['normalized_transcript']
              pitch_gap = abs((r['f0_median_hz'] or 0)-(cur['f0_median_hz'] or 0))/max(cur['f0_median_hz'] or 1,1)
              loud_gap = abs(r['rms_db_median']-cur['rms_db_median'])/20
              score = (0 if has_phrase else 10) + 2*r['boundary_match_cost'] + r['dtw_clean_current_cost'] + pitch_gap + loud_gap
              scores[label]=score
          winner=min(scores,key=scores.get)

          lines=[]
          lines.append('# Chapter 1 Independent Audio Analysis')
          lines.append('')
          lines.append('Automated independent analysis of the three committed review clips. No source audio was modified.')
          lines.append('')
          lines.append('## Speech recognition')
          for label in ('CURRENT','V1','V2'):
              r=results[label]
              lines.append(f'### {label}')
              lines.append(f'- Transcript: {r["transcript"]}')
              lines.append(f'- Contains exact phrase “to ensure”: {"YES" if "to ensure" in r["normalized_transcript"] else "NO"}')
              lines.append(f'- Duration: {r["duration"]:.3f} s')
              lines.append(f'- Median loudness: {r["rms_db_median"]:.2f} dBFS')
              lines.append(f'- Median pitch: {r["f0_median_hz"]:.2f} Hz' if r['f0_median_hz'] else '- Median pitch: unavailable')
              lines.append(f'- Median spectral centroid: {r["spectral_centroid_median_hz"]:.1f} Hz')
              if label != 'CURRENT':
                  lines.append(f'- Clean-material DTW cost vs CURRENT (lower is closer): {r["dtw_clean_current_cost"]:.6f}')
                  lines.append(f'- Boundary-match cost vs CURRENT (lower is safer for splice): {r["boundary_match_cost"]:.6f}')
              lines.append('')
          lines.append('## Recommendation')
          lines.append(f'**Preferred source: {winner}.**')
          lines.append(f'- Composite splice-risk score (lower is better): V1={scores["V1"]:.6f}; V2={scores["V2"]:.6f}.')
          lines.append('- Use the smallest natural phrase or clause that restores “to ensure”; do not replace the entire chapter.')
          lines.append('- Make the edit from the lossless/current source files, not from these review MP3s.')
          lines.append('- After the splice, perform a human seam listen at headphones and speaker volume before rebuilding the full book.')
          lines.append('')
          lines.append('## Raw measurements')
          lines.append('```json')
          lines.append(json.dumps({'scores':scores,'results':results},indent=2))
          lines.append('```')
          out=ROOT/'CH1-INDEPENDENT-AUDIO-ANALYSIS.md'
          out.write_text('\n'.join(lines),encoding='utf-8')
          print('\n'.join(lines[:80]))
          PY
          python /tmp/analyze_ch1.py

      - name: Commit analysis report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scratchpad/ch1-audio-review/CH1-INDEPENDENT-AUDIO-ANALYSIS.md
          git diff --cached --quiet && exit 0
          git commit -m "docs(audio): add independent Chapter 1 comparison report"
          git push origin HEAD:audiobook-approved-manifest
